<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>마진 계산기</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #f5f7fa;
            margin: 0;
            padding: 16px;
            color: #333;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 20px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            color: #1a73e8;
            font-weight: 800;
        }
        .input-group {
            margin-bottom: 14px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #202124;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        input {
            width: 100%;
            padding: 12px;
            padding-right: 60px; /* 단위와 화살표가 들어갈 충분한 공간 */
            border: 1px solid #dadce0;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
            -moz-appearance: textfield; /* 파이어폭스 기본 화살표 숨김 */
        }
        /* 크롬, 사파리 등 일반 브라우저의 기본 숫자 화살표 완전 숨김 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input:focus {
            border-color: #1a73e8;
        }
        
        /* 커스텀 우측 컨트롤 영역 (글자 + 화살표) */
        .control-box {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .unit {
            font-size: 14px;
            color: #5f6368;
            font-weight: bold;
            user-select: none;
        }
        .spin-buttons {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 22px;
            height: 34px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            overflow: hidden;
            background: #f8f9fa;
        }
        .spin-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 17px;
            width: 100%;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            font-size: 9px;
            color: #5f6368;
            user-select: none;
        }
        .spin-btn:active {
            background-color: #e8eaed;
        }
        .spin-btn.up {
            border-bottom: 1px solid #dadce0;
        }

        .divider {
            height: 1px;
            background-color: #e8eaed;
            margin: 20px 0;
        }
        .result-box {
            background-color: #e8f0fe;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .result-box.highlight {
            background-color: #e6f4ea;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .result-row:last-child {
            margin-bottom: 0;
        }
        .result-label {
            font-size: 14px;
            font-weight: 700;
            color: #202124;
        }
        .result-value {
            font-size: 18px;
            font-weight: 800;
            color: #137333;
        }
        .result-box:not(.highlight) .result-value {
            color: #1a73e8;
        }
        .info-text {
            font-size: 11px;
            color: #70757a;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 모바일 마진 계산기</h1>
    
    <!-- 입력 필드 -->
    <div class="input-group">
        <label for="c1">원가</label>
        <div class="input-wrapper">
            <input type="number" id="c1" value="0" min="0">
            <div class="control-box">
                <span class="unit">원</span>
                <div class="spin-buttons">
                    <button class="spin-btn up" onclick="stepValue('c1', 100)">▲</button>
                    <button class="spin-btn down" onclick="stepValue('c1', -100)">▼</button>
                </div>
            </div>
        </div>
    </div>

    <div class="input-group">
        <label for="d1">포장입고비</label>
        <div class="input-wrapper">
            <input type="number" id="d1" value="0" min="0">
            <div class="control-box">
                <span class="unit">원</span>
                <div class="spin-buttons">
                    <button class="spin-btn up" onclick="stepValue('d1', 100)">▲</button>
                    <button class="spin-btn down" onclick="stepValue('d1', -100)">▼</button>
                </div>
            </div>
        </div>
    </div>

    <div class="input-group">
        <label for="e1">판매수수료</label>
        <div class="input-wrapper">
            <input type="number" id="e1" value="10.8" step="0.1" min="0">
            <div class="control-box">
                <span class="unit">%</span>
                <div class="spin-buttons">
                    <button class="spin-btn up" onclick="stepValue('e1', 1)">▲</button>
                    <button class="spin-btn down" onclick="stepValue('e1', -1)">▼</button>
                </div>
            </div>
        </div>
    </div>

    <div class="input-group">
        <label for="f1">그로스수수료</label>
        <div class="input-wrapper">
            <input type="number" id="f1" value="2800" min="0">
            <div class="control-box">
                <span class="unit">원</span>
                <div class="spin-buttons">
                    <button class="spin-btn up" onclick="stepValue('f1', 100)">▲</button>
                    <button class="spin-btn down" onclick="stepValue('f1', -100)">▼</button>
                </div>
            </div>
        </div>
    </div>

    <div class="input-group">
        <label for="g1">요구 마진율</label>
        <div class="input-wrapper">
            <input type="number" id="g1" value="30" min="0" max="100">
            <div class="control-box">
                <span class="unit">%</span>
                <div class="spin-buttons">
                    <button class="spin-btn up" onclick="stepValue('g1', 1)">▲</button>
                    <button class="spin-btn down" onclick="stepValue('g1', -1)">▼</button>
                </div>
            </div>
        </div>
    </div>

    <div class="divider"></div>

    <!-- 결과 출력 -->
    <div class="result-box">
        <div class="result-row">
            <span class="result-label">판매가</span>
            <span class="result-value" id="h1">0원</span>
        </div>
    </div>

    <div class="result-box highlight">
        <div class="result-row">
            <span class="result-label">마진</span>
            <span class="result-value" id="i1">0원</span>
        </div>
        <div class="result-row" style="margin-top: 8px;">
            <span class="result-label">실제 마진율</span>
            <span class="result-value" id="j1">0%</span>
        </div>
    </div>

    <div class="result-box" style="background-color: #f1f3f4;">
        <div class="result-row">
            <span class="result-label">엔드 로아스</span>
            <span class="result-value" id="k1" style="color: #3c4043;">0%</span>
        </div>
    </div>
    
    <div class="info-text">* 수수료 부가세 10% 일괄 반영(수식 반영 완료)</div>
</div>

<script>
// 커스텀 증감 버튼 함수
function stepValue(id, amount) {
    const input = document.getElementById(id);
    let val = parseFloat(input.value) || 0;
    val += amount;
    if (val < 0) val = 0; // 음수 방지
    
    if (id === 'e1') {
        input.value = parseFloat(val.toFixed(1));
    } else {
        input.value = Math.round(val);
    }
    formatInputValue(input);
    calculate();
}

// 앞에 불필요한 0(예: 03800, 010.8)이 생기지 않도록 실시간 포맷팅 처리하는 함수
function formatInputValue(input) {
    let valStr = input.value;
    if (valStr === '') return;
    
    // 숫자로 변환 후 다시 문자열로 바꿔서 앞의 무의미한 0 제거
    let num = parseFloat(valStr);
    if (!isNaN(num)) {
        // 단, 소비자가 소수점을 입력 중인 상황(예: "10.")을 고려하여 처리
        if (valStr.includes('.') && valStr.endsWith('0') && !valStr.endsWith('.0')) {
            // 소수점 아래 0을 유지해야 하는 특수 상황이 아니면 기본 변환
            input.value = valStr.replace(/^0+(?=\d)/, '');
        } else if (valStr.startsWith('0') && valStr.length > 1 && valStr[1] !== '.') {
            input.value = num;
        }
    }
}

// 직접 키보드로 입력할 때 이벤트 처리
document.querySelectorAll('input').forEach(input => {
    // 포커스가 빠져나갈 때 최종적으로 앞의 0을 확실히 제거
    input.addEventListener('blur', function() {
        if(this.value !== '') {
            this.value = parseFloat(this.value);
        }
    });
    
    input.addEventListener('input', function() {
        formatInputValue(this);
        calculate();
    });
});

function calculate() {
    const c1 = parseFloat(document.getElementById('c1').value) || 0;
    const d1 = parseFloat(document.getElementById('d1').value) || 0;
    const e1 = (parseFloat(document.getElementById('e1').value) || 0) / 100;
    const f1 = parseFloat(document.getElementById('f1').value) || 0;
    const g1 = (parseFloat(document.getElementById('g1').value) || 0) / 100;

    let h1 = 0;
    let i1 = 0;
    let j1 = 0;
    let k1 = 0;

    if ((c1 + d1) > 0) {
        const bunmo = 1 - g1 - (e1 * 1.1);
        if (bunmo > 0) {
            const tempH1 = (c1 + d1 + (f1 * 1.1)) / bunmo;
            h1 = Math.ceil(tempH1 / 100) * 100;
        } else {
            h1 = 0;
        }
    }

    if (h1 > 0) {
        i1 = h1 - (((h1 * e1) + f1) * 1.1) - c1 - d1;
    }

    if (h1 !== 0) {
        j1 = i1 / h1;
    }

    if (i1 !== 0) {
        k1 = (h1 / i1) * 1.1;
    }

    document.getElementById('h1').innerText = h1.toLocaleString() + '원';
    document.getElementById('i1').innerText = Math.round(i1).toLocaleString() + '원';
    document.getElementById('j1').innerText = (j1 * 100).toFixed(2) + '%';
    
    if (i1 !== 0) {
        document.getElementById('k1').innerText = (k1 * 100).toFixed(2) + '%';
    } else {
        document.getElementById('k1').innerText = '-';
    }
}

calculate();
</script>

</body>
</html>
